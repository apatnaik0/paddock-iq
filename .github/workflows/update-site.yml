name: Update F1 Demo Site

on:
  workflow_dispatch:
    inputs:
      season:
        description: "F1 season year"
        required: true
        default: "2025"
      round:
        description: "Round number"
        required: true
        default: "1"
      train_round_end:
        description: "Last 2024 round to include in training backfill"
        required: true
        default: "2"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python -m src.f1demo.pipeline \
            --season ${{ github.event.inputs.season }} \
            --round ${{ github.event.inputs.round }} \
            --train-round-end ${{ github.event.inputs.train_round_end }}

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs site
          git diff --cached --quiet || git commit -m "Update site for season ${{ github.event.inputs.season }} round ${{ github.event.inputs.round }}"
          git push
