name: Build and Deploy Pages

on:
  workflow_dispatch:
    inputs:
      season:
        description: "F1 season year"
        required: true
        default: "2026"
      round:
        description: "Round number"
        required: true
        default: "1"
      quick:
        description: "Use quick mode (true/false)"
        required: true
        default: "true"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.quick }}" = "true" ]; then
              python -m src.f1demo.pipeline \
                --season "${{ github.event.inputs.season }}" \
                --round "${{ github.event.inputs.round }}" \
                --quick
            else
              python -m src.f1demo.pipeline \
                --season "${{ github.event.inputs.season }}" \
                --round "${{ github.event.inputs.round }}"
            fi
          else
            python -m src.f1demo.pipeline --season 2026 --round 1 --quick
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
